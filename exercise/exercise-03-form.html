<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: "Kanit", sans-serif;
            line-height: 1.6; 
            color: #222323; 
            margin: 0;
            background-color: #FFFDF4;
        }
        .form-container{
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }
        h2 { 
            color: #41101B; text-align: center; margin-bottom: 20px; 
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        label { 
            display: block; margin-bottom: 5px; font-weight: bold; 
        }
        input[type="text"], input[type="password"], input[type="email"] { 
            width: 100%; 
            padding: 10px; 
            border: 1px 
            solid #ccc; 
            border-radius: 6px; 
            box-sizing: 
            border-box; 
        }
        .radio-group, .checkbox-group { 
            margin-top: 5px; 
            background: #fff6f8; 
            padding: 10px; 
            border-radius: 6px; 
        }
        button {
            font-family: "Kanit", sans-serif;
            width: 100%; 
            padding: 12px; 
            background-color: #41101B; 
            color: #FFFDF4; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 15px; 
        }
        button:hover { 
            background-color: #222323; 
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>สมัครสมาชิก FlexiWardrobe</h2>
        <form>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">รหัสผ่าน:</label>
                <input type="password" id="password" name="password" placeholder="password" required>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group">
                    <label for="first_name">ชื่อ:</label>
                    <input type="text" id="first_name" name="first_name" placeholder="ชื่อจริง">
                </div>
                <div class="form-group">
                    <label for="last_name">นามสกุล:</label>
                    <input type="text" id="last_name" name="last_name" placeholder="นามสกุล">
                </div>
            </div>

            <div class="form-group">
                <label for="phone">เบอร์โทรศัพท์:</label>
                <input type="text" id="phone" name="phone" placeholder="08x-xxx-xxxx">
            </div>

            <div class="form-group">
                <label>เลือกบทบาท:</label>
                <div class="radio-group">
                    <input type="radio" id="customer" name="role" value="customer" checked>
                    <label for="customer" style="display:inline;">ลูกค้า (Customer)</label>
                    <input type="radio" id="admin" name="role" value="admin">
                    <label for="admin" style="display:inline;">ผู้ดูแลระบบ (Admin)</label>
                </div>
            </div>

            <div class="form-group">
                <label>ความสนใจพิเศษ:</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="movie" name="interest" value="movie">
                    <label for="movie" style="display:inline;">ดูแฟชั่นโชว์ (Movie)</label>
                    
                    <br>
                    
                    <input type="checkbox" id="music" name="interest" value="music">
                    <label for="music" style="display:inline;">ฟังข่าวสารแบรนด์ (Music)</label><br>
                    <input type="checkbox" id="game" name="interest" value="game">
                    <label for="game" style="display:inline;">กิจกรรมเล่นเกมรับส่วนลด (Game)</label>
                </div>
            </div>

            <button type="submit">ยืนยันการสมัคร</button>
        </form>
    </div>
</body>
</html>
