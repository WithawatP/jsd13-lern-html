<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: "Kanit", sans-serif;
            line-height: 1.6; 
            color: #222323; 
            margin: 0;
            background-color: #FFFDF4;
        }
        .form-container{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate( -50%, -50%);
            align-items: center;
            overflow: hidden;
            padding: 2rem;
            background-color: #ffffff;
            border-radius: 2rem;
            box-shadow: 6px 6px 20px rgba(0, 0, 0, 0.3);
        }
        h2 { 
            color: #41101B; 
            text-align: center; 
            margin-bottom: 20px; 
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        label { 
            display: block; 
            margin-bottom: 5px; 
        }
        input[type="text"], input[type="password"], input[type="email"] { 
            font-family: "Kanit", sans-serif;
            width: 100%; 
            padding: 10px; 
            border: 1px 
            solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
        }
        .radio-group, .checkbox-group { 
            margin-top: 5px; 
            background: #fff6f8; 
            padding: 10px; 
            border-radius: 6px; 
        }
        button {
            font-family: "Kanit", sans-serif;
            width: 100%; 
            padding: 12px; 
            background-color: #41101B; 
            color: #FFFDF4; 
            border: none; 
            border-radius: 1rem; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 15px; 
        }
        button:hover { 
            background-color: #222323; 
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>สมัครสมาชิก FlexiWardrobe</h2>
        <form>
            <div class="form-group">
                <label for="email" style="font-weight: bold;">Email:</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label for="password" style="font-weight: bold;">รหัสผ่าน:</label>
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group">
                    <label for="first_name" style="font-weight: bold;">ชื่อ:</label>
                    <input type="text" id="first_name" name="first_name" placeholder="ชื่อจริง">
                </div>
                <div class="form-group">
                    <label for="last_name" style="font-weight: bold;">นามสกุล:</label>
                    <input type="text" id="last_name" name="last_name" placeholder="นามสกุล">
                </div>
            </div>

            <div class="form-group">
                <label for="phone" style="font-weight: bold;">เบอร์โทรศัพท์:</label>
                <input type="text" id="phone" name="phone" placeholder="08x-xxx-xxxx">
            </div>

            <div class="form-group">
                <label style="font-weight: bold;">เลือกบทบาท:</label>
                <div class="radio-group">
                    <input type="radio" id="customer" name="role" value="customer" checked>
                    <label for="customer" style="display:inline;">ลูกค้า (Customer)</label>
                    <input type="radio" id="admin" name="role" value="admin">
                    <label for="admin" style="display:inline;">ผู้ดูแลระบบ (Admin)</label>
                </div>
            </div>

            <div class="form-group">
                <label style="font-weight: bold;">ความสนใจพิเศษ:</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="minimal" name="interest" value="minimal">
                    <label for="movie" font-weight: none; style="display:inline;">Minimal</label>
                    
                    <br>
                    
                    <input type="checkbox" id="street" name="interest" value="street">
                    <label for="music" style="display:inline;">Street</label>

                    <br>

                    <input type="checkbox" id="luxury" name="interest" value="luxury">
                    <label for="luxury" style="display:inline;">Luxury</label>
                </div>
            </div>

            <button type="submit">ยืนยันการสมัคร</button>
        </form>
    </div>
</body>
</html>
